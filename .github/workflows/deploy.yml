name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build
          cp dist/manifest.webmanifest dist/app/ || true
          cp dist/registerSW.js dist/app/ || true
          cp dist/sw.js dist/app/ || true
          cp dist/workbox-*.js dist/app/ || true
          cp dist/app_icon_*.png dist/app/ || true

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
