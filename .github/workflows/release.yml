name: Release Apps (Mac, Win, Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./dashboard
          tagName: ${{ github.ref_name }}
          releaseName: 'Boat & Rv Guardian ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the app for Android, macOS, or Windows.'
          releaseDraft: false
          prerelease: false

      - name: Upload macOS DMG to Cloudflare R2
        # Best-effort CDN mirror; the GitHub release already holds the binaries.
        continue-on-error: true
        if: matrix.platform == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_EDIT }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: ./dashboard
        run: |
          npm i -g wrangler
          DMG_FILE=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -n 1)
          wrangler r2 object put brg-downloads/boat-rv-guardian_latest.dmg --file "$DMG_FILE" --remote

      - name: Upload Windows EXE to Cloudflare R2
        continue-on-error: true
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_EDIT }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: ./dashboard
        shell: bash
        run: |
          npm i -g wrangler
          EXE_FILE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -n 1)
          wrangler r2 object put brg-downloads/boat-rv-guardian_latest.exe --file "$EXE_FILE" --remote

  release-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install frontend dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Build Frontend
        working-directory: ./dashboard
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./dashboard
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x dashboard/android/gradlew

      - name: Build Release APK
        working-directory: ./dashboard/android
        timeout-minutes: 20
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo $KEYSTORE_BASE64 | base64 --decode > dashboard/android/app/release.keystore
            export BUILD_TOOLS_VERSION=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -n 1)
            $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
              --ks dashboard/android/app/release.keystore \
              --ks-key-alias boatguardian \
              --ks-pass pass:boatguardian \
              --key-pass pass:boatguardian \
              dashboard/android/app/build/outputs/apk/release/app-release-unsigned.apk
            mv dashboard/android/app/build/outputs/apk/release/app-release-unsigned.apk boat-rv-guardian-release.apk
          else
            echo "No keystore secret set, uploading unsigned APK"
            cp dashboard/android/app/build/outputs/apk/release/app-release-unsigned.apk boat-rv-guardian-release.apk
          fi

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: boat-rv-guardian-release.apk

      - name: Upload Android APK to Cloudflare R2
        continue-on-error: true
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_EDIT }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm i -g wrangler
          wrangler r2 object put brg-downloads/boat-rv-guardian_latest.apk --file boat-rv-guardian-release.apk --remote
