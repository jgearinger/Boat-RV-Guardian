name: Release Apps (Mac, Win, Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Boat & RV Guardian ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the app for Android, macOS, or Windows.'
          releaseDraft: false
          prerelease: false

  release-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Decode Keystore and Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SIGNING_KEY_ALIAS: boatguardian
          SIGNING_KEY_PASSWORD: boatguardian
          SIGNING_STORE_PASSWORD: boatguardian
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/release.keystore
          export BUILD_TOOLS_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          /usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS_VERSION/apksigner sign --ks android/app/release.keystore --ks-key-alias $SIGNING_KEY_ALIAS --ks-pass pass:$SIGNING_STORE_PASSWORD --key-pass pass:$SIGNING_KEY_PASSWORD android/app/build/outputs/apk/release/app-release-unsigned.apk
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk boat-rv-guardian-release.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: boat-rv-guardian-release.apk
