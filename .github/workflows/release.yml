name: Release Apps (Mac, Win, Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Boat & RV Guardian ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the app for Android, macOS, or Windows.'
          releaseDraft: false
          prerelease: false

  release-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: ./android
        timeout-minutes: 20
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo $KEYSTORE_BASE64 | base64 --decode > android/app/release.keystore
            export BUILD_TOOLS_VERSION=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -n 1)
            $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
              --ks android/app/release.keystore \
              --ks-key-alias boatguardian \
              --ks-pass pass:boatguardian \
              --key-pass pass:boatguardian \
              android/app/build/outputs/apk/release/app-release-unsigned.apk
            mv android/app/build/outputs/apk/release/app-release-unsigned.apk boat-rv-guardian-release.apk
          else
            echo "No keystore secret set, uploading unsigned APK"
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk boat-rv-guardian-release.apk
          fi

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: boat-rv-guardian-release.apk
