name: Build Android APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor Android
        run: npm run android:sync > sync-log.txt 2>&1 || true

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug --stacktrace > build-log.txt 2>&1 || true

      - name: Upload Logs to Repo
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp android/build-log.txt ./build-log.txt || true
          git add sync-log.txt build-log.txt
          git commit -m "ci: Push logs for debug" || true
          git push

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: boat-rv-guardian-debug.apk
          path: '**/*.apk'
