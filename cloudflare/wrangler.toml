name = "boat-rv-guardian-notifications"
main = "src/index.js"
compatibility_date = "2024-06-20"

# KV Namespace for storing device FCM tokens
# You must create this namespace using: npx wrangler kv:namespace create FCM_TOKENS
# Then paste the generated id below.
kv_namespaces = [
  { binding = "FCM_TOKENS", id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID" }
]

[vars]
# Put your Firebase Project ID here
FIREBASE_PROJECT_ID = "your-firebase-project-id"

# The following secrets must be set via `npx wrangler secret put <NAME>`
# FIREBASE_CLIENT_EMAIL = "firebase-adminsdk-xxx@your-firebase-project-id.iam.gserviceaccount.com"
# FIREBASE_PRIVATE_KEY = "-----BEGIN PRIVATE KEY-----\nMIIEv...=\n-----END PRIVATE KEY-----\n"
